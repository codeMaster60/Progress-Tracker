<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streak Stories - Viral Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeIn 0.5s ease-out;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="app"></div>

    <script>
        // Simple state management
        let state = {
            activeTab: 'home',
            showOnboarding: true,
            showShareModal: false,
            selectedHabit: null,
            habits: [
                { id: 1, name: 'Drink Water', icon: '💧', streak: 7, completed: true, color: 'from-blue-400 to-cyan-500' },
                { id: 2, name: 'Exercise', icon: '💪', streak: 3, completed: true, color: 'from-orange-400 to-red-500' },
                { id: 3, name: 'Read', icon: '📚', streak: 0, completed: false, color: 'from-purple-400 to-pink-500' },
            ],
            friendActivity: [
                { name: 'Sarah M.', habit: 'Meditation', streak: 15, avatar: '👩‍🦰' },
                { name: 'Mike T.', habit: 'Running', streak: 21, avatar: '👨' },
                { name: 'Lisa K.', habit: 'Journaling', streak: 30, avatar: '👩' },
            ]
        };

        function render() {
            const app = document.getElementById('app');
            
            if (state.showOnboarding) {
                app.innerHTML = renderOnboarding();
            } else {
                app.innerHTML = renderMainApp();
            }
            
            attachEventListeners();
        }

        function renderOnboarding() {
            return `
                <div class="fixed inset-0 bg-gradient-to-br from-purple-600 via-pink-500 to-orange-500 flex items-center justify-center p-6">
                    <div class="max-w-md text-center space-y-8 animate-in">
                        <div class="relative">
                            <div class="absolute inset-0 bg-white opacity-20 blur-3xl rounded-full"></div>
                            <div class="text-8xl relative z-10">🔥</div>
                        </div>
                        
                        <div>
                            <h1 class="text-5xl font-bold text-white mb-4">Streak Stories</h1>
                            <p class="text-xl text-white text-opacity-90">
                                Build habits. Share achievements. Inspire friends.
                            </p>
                        </div>

                        <div class="space-y-4 text-left bg-white bg-opacity-10 backdrop-blur-lg rounded-2xl p-6 text-white">
                            <div class="flex items-start gap-4">
                                <div class="w-10 h-10 bg-white bg-opacity-20 rounded-full flex items-center justify-center flex-shrink-0 text-2xl">
                                    🏆
                                </div>
                                <div>
                                    <div class="font-semibold mb-1">Build Streaks</div>
                                    <div class="text-sm text-opacity-80 text-white">Complete habits daily to build powerful streaks</div>
                                </div>
                            </div>
                            
                            <div class="flex items-start gap-4">
                                <div class="w-10 h-10 bg-white bg-opacity-20 rounded-full flex items-center justify-center flex-shrink-0 text-2xl">
                                    📤
                                </div>
                                <div>
                                    <div class="font-semibold mb-1">Share Visual Stories</div>
                                    <div class="text-sm text-opacity-80 text-white">Turn achievements into beautiful shareable stories</div>
                                </div>
                            </div>
                            
                            <div class="flex items-start gap-4">
                                <div class="w-10 h-10 bg-white bg-opacity-20 rounded-full flex items-center justify-center flex-shrink-0 text-2xl">
                                    👥
                                </div>
                                <div>
                                    <div class="font-semibold mb-1">Challenge Friends</div>
                                    <div class="text-sm text-opacity-80 text-white">Compete and motivate each other to stay consistent</div>
                                </div>
                            </div>
                        </div>

                        <button onclick="startApp()" class="w-full bg-white text-purple-600 py-5 rounded-2xl font-bold text-lg hover:shadow-2xl transition-all">
                            Start Building Habits
                        </button>

                        <div class="text-white text-opacity-70 text-sm">
                            Free: 3 habits • Premium: Unlimited habits + themes
                        </div>
                    </div>
                </div>
            `;
        }

        function renderMainApp() {
            return `
                <div class="min-h-screen pb-20">
                    <!-- Header -->
                    <div class="bg-gradient-to-r from-purple-600 to-pink-600 text-white p-6 pb-8">
                        <div class="flex justify-between items-center mb-6">
                            <h1 class="text-2xl font-bold">Streak Stories</h1>
                            <button class="bg-white bg-opacity-20 backdrop-blur-lg px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-2 hover:bg-opacity-30 transition-all">
                                👑 Upgrade
                            </button>
                        </div>
                        
                        <div class="bg-white bg-opacity-20 backdrop-blur-lg rounded-2xl p-4">
                            <div class="text-sm text-white text-opacity-80 mb-2">Your longest streak</div>
                            <div class="flex items-center gap-3">
                                <span class="text-4xl">🔥</span>
                                <div class="text-4xl font-bold">7</div>
                                <div class="text-sm">days</div>
                            </div>
                        </div>
                    </div>

                    <!-- Main Content -->
                    <div class="px-6 -mt-4">
                        ${state.activeTab === 'home' ? renderHomeTab() : renderStatsTab()}
                    </div>

                    <!-- Bottom Nav -->
                    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 px-6 py-4">
                        <div class="flex justify-around items-center">
                            <button onclick="changeTab('home')" class="flex flex-col items-center gap-1 ${state.activeTab === 'home' ? 'text-purple-600' : 'text-gray-400'}">
                                <span class="text-2xl">🔥</span>
                                <span class="text-xs font-medium">Habits</span>
                            </button>
                            <button onclick="changeTab('stats')" class="flex flex-col items-center gap-1 ${state.activeTab === 'stats' ? 'text-purple-600' : 'text-gray-400'}">
                                <span class="text-2xl">📈</span>
                                <span class="text-xs font-medium">Stats</span>
                            </button>
                            <button class="flex flex-col items-center gap-1 text-gray-400">
                                <span class="text-2xl">👥</span>
                                <span class="text-xs font-medium">Friends</span>
                            </button>
                        </div>
                    </div>

                    ${state.showShareModal ? renderShareModal() : ''}
                </div>
            `;
        }

        function renderHomeTab() {
            return `
                <div class="space-y-6">
                    <div>
                        <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                            📅 Today's Habits
                        </h2>
                        
                        <div class="space-y-3">
                            ${state.habits.map(habit => `
                                <div class="bg-white rounded-2xl p-5 shadow-sm hover:shadow-md transition-all">
                                    <div class="flex items-center justify-between">
                                        <div class="flex items-center gap-4 flex-1">
                                            <button onclick="toggleHabit(${habit.id})" class="w-14 h-14 rounded-2xl flex items-center justify-center transition-all ${
                                                habit.completed 
                                                    ? `bg-gradient-to-br ${habit.color}` 
                                                    : 'bg-gray-100 hover:bg-gray-200'
                                            }">
                                                <span class="text-3xl">${habit.icon}</span>
                                            </button>
                                            
                                            <div class="flex-1">
                                                <div class="font-semibold text-lg">${habit.name}</div>
                                                <div class="flex items-center gap-2 text-sm text-gray-600">
                                                    <span>🔥</span>
                                                    <span class="font-semibold">${habit.streak} day streak</span>
                                                </div>
                                            </div>
                                        </div>

                                        ${habit.streak >= 3 && habit.completed ? `
                                            <button onclick="openShareModal(${habit.id})" class="bg-gradient-to-r from-purple-100 to-pink-100 text-purple-600 p-3 rounded-xl hover:shadow-lg transition-all">
                                                📤
                                            </button>
                                        ` : ''}
                                    </div>

                                    ${habit.streak === 7 ? `
                                        <div class="mt-3 bg-gradient-to-r from-yellow-100 to-orange-100 rounded-xl p-3 flex items-center gap-2">
                                            <span class="text-xl">🏆</span>
                                            <span class="text-sm font-semibold text-orange-900">First week milestone! Share it?</span>
                                        </div>
                                    ` : ''}
                                </div>
                            `).join('')}

                            <button class="w-full border-2 border-dashed border-gray-300 rounded-2xl p-5 text-gray-500 hover:border-purple-300 hover:text-purple-600 transition-all flex items-center justify-center gap-2">
                                <span class="text-2xl">+</span>
                                <span class="font-semibold">Add Habit</span>
                                <span class="text-xl">🔒</span>
                                <span class="text-xs">(1 free slot left)</span>
                            </button>
                        </div>
                    </div>

                    <div>
                        <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                            👥 Friend Activity
                        </h2>
                        
                        <div class="space-y-3">
                            ${state.friendActivity.map(friend => `
                                <div class="bg-white rounded-2xl p-4 shadow-sm hover:shadow-md transition-all flex items-center justify-between">
                                    <div class="flex items-center gap-3">
                                        <div class="text-3xl">${friend.avatar}</div>
                                        <div>
                                            <div class="font-semibold">${friend.name}</div>
                                            <div class="text-sm text-gray-600">${friend.habit}</div>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <span class="text-xl">🔥</span>
                                        <span class="text-2xl font-bold text-gray-800">${friend.streak}</span>
                                    </div>
                                </div>
                            `).join('')}
                            
                            <button class="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white py-4 rounded-2xl font-semibold hover:shadow-lg transition-all flex items-center justify-center gap-2">
                                👥 Invite Friends & Compete
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderStatsTab() {
            return `
                <div class="space-y-6">
                    <h2 class="text-xl font-bold flex items-center gap-2">
                        📈 Your Growth
                    </h2>
                    
                    <div class="bg-white rounded-2xl p-6 shadow-sm">
                        <div class="grid grid-cols-3 gap-4 text-center">
                            <div>
                                <div class="text-3xl font-bold text-purple-600">7</div>
                                <div class="text-sm text-gray-600">Best Streak</div>
                            </div>
                            <div>
                                <div class="text-3xl font-bold text-pink-600">3</div>
                                <div class="text-sm text-gray-600">Active Habits</div>
                            </div>
                            <div>
                                <div class="text-3xl font-bold text-orange-600">85%</div>
                                <div class="text-sm text-gray-600">Completion</div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-gradient-to-br from-purple-50 to-pink-50 rounded-2xl p-6">
                        <div class="flex items-center gap-3 mb-4">
                            <span class="text-2xl">🏆</span>
                            <h3 class="font-bold text-lg">Achievements</h3>
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            ${['🔥', '💧', '💪', '📚', '🏆', '⭐'].map(emoji => `
                                <div class="bg-white rounded-xl p-4 text-center">
                                    <div class="text-3xl mb-1">${emoji}</div>
                                    <div class="text-xs text-gray-600">Week 1</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderShareModal() {
            const habit = state.habits.find(h => h.id === state.selectedHabit);
            if (!habit) return '';

            return `
                <div class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4 animate-in">
                    <div class="bg-white rounded-3xl max-w-sm w-full overflow-hidden shadow-2xl">
                        <!-- Story Card Preview -->
                        <div class="relative h-96 bg-gradient-to-br ${habit.color} p-8 flex flex-col justify-between">
                            <div class="absolute inset-0 opacity-20">
                                <div class="absolute top-10 left-10 w-32 h-32 bg-white rounded-full blur-3xl"></div>
                                <div class="absolute bottom-10 right-10 w-40 h-40 bg-white rounded-full blur-3xl"></div>
                            </div>
                            
                            <div class="relative z-10">
                                <div class="flex items-center gap-2 mb-4">
                                    <div class="w-12 h-12 bg-white bg-opacity-30 backdrop-blur-lg rounded-full flex items-center justify-center text-2xl">
                                        ${habit.icon}
                                    </div>
                                    <div class="text-white text-sm font-medium">You</div>
                                </div>
                            </div>

                            <div class="relative z-10 text-center">
                                <div class="flex items-center justify-center gap-3 mb-4">
                                    <span class="text-7xl">🔥</span>
                                    <div class="text-7xl font-bold text-white drop-shadow-lg">${habit.streak}</div>
                                </div>
                                <div class="text-2xl font-bold text-white mb-2">${habit.name} Streak!</div>
                                <div class="text-white text-opacity-90 text-sm">
                                    ${habit.streak === 7 ? '🎉 First week complete!' : 
                                    habit.streak === 30 ? '🏆 One month strong!' :
                                    habit.streak === 100 ? '💎 Century milestone!' : 
                                    'Keep going!'}
                                </div>
                            </div>

                            <div class="relative z-10 text-center">
                                <div class="text-white text-opacity-80 text-xs">
                                    Created with Streak Stories
                                </div>
                            </div>
                        </div>

                        <!-- Share Options -->
                        <div class="p-6 space-y-3">
                            <div class="text-sm text-gray-600 text-center mb-4">
                                Share your achievement and inspire others!
                            </div>
                            
                            <button class="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white py-4 rounded-xl font-semibold hover:shadow-lg transition-all flex items-center justify-center gap-2">
                                📤 Share to Instagram Stories
                            </button>
                            
                            <button class="w-full bg-blue-500 text-white py-4 rounded-xl font-semibold hover:shadow-lg transition-all">
                                Share to Facebook
                            </button>
                            
                            <button class="w-full bg-gradient-to-r from-blue-400 to-blue-600 text-white py-4 rounded-xl font-semibold hover:shadow-lg transition-all">
                                Share to Twitter
                            </button>

                            <button class="w-full border-2 border-gray-200 text-gray-700 py-4 rounded-xl font-semibold hover:bg-gray-50 transition-all flex items-center justify-center gap-2">
                                👥 Challenge Friends
                            </button>
                            
                            <button onclick="closeShareModal()" class="w-full text-gray-500 py-3 font-medium">
                                Cancel
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        // Event handlers
        function startApp() {
            state.showOnboarding = false;
            render();
        }

        function changeTab(tab) {
            state.activeTab = tab;
            render();
        }

        function toggleHabit(habitId) {
            const habit = state.habits.find(h => h.id === habitId);
            if (habit) {
                habit.completed = !habit.completed;
                if (!habit.completed && habit.streak > 0) {
                    // Don't decrease on toggle off for demo
                } else if (habit.completed) {
                    habit.streak++;
                }
            }
            render();
        }

        function openShareModal(habitId) {
            state.selectedHabit = habitId;
            state.showShareModal = true;
            render();
        }

        function closeShareModal() {
            state.showShareModal = false;
            state.selectedHabit = null;
            render();
        }

        function attachEventListeners() {
            // Make functions globally accessible
            window.startApp = startApp;
            window.changeTab = changeTab;
            window.toggleHabit = toggleHabit;
            window.openShareModal = openShareModal;
            window.closeShareModal = closeShareModal;
        }
f
        // Initial render
        render();
    </script>
</body>
</html>
